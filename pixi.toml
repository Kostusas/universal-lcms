[workspace]
name = "universal-lcms"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.24"
pyteomics = ">=4.7"
lxml = ">=5"
matplotlib = ">=3.8"

[tasks]
lcms-uv = { cmd = "python -m lcms_uv", env = { PYTHONPATH = "src" } }
fit-qc2 = { cmd = "python -m lcms_uv test-data/QC2_rtclip.mzML --json-out notes/qc2_fit.json", env = { PYTHONPATH = "src" } }
plot-vst-compare = { cmd = "python scripts/plot_vst_track_compare.py --file test-data/QC2_rtclip.mzML", env = { PYTHONPATH = "src" } }
